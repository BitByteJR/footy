# Local development stack for footy.
# - postgres: the database
# - api:      the FastAPI app (built from local Dockerfile)

services:
  postgres:
    image: postgres:16-alpine
    container_name: footy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-footy}
      POSTGRES_USER: ${POSTGRES_USER:-footy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-footy_dev_password}
    ports:
      # Override POSTGRES_PORT in .env if the default is already taken on the host.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-footy} -d ${POSTGRES_DB:-footy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: footy-api
    restart: unless-stopped
    environment:
      # Inside the compose network the DB hostname is the service name `postgres`,
      # not localhost — and the port is 5432 (host port mapping doesn't apply here).
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-footy}:${POSTGRES_PASSWORD:-footy_dev_password}@postgres:5432/${POSTGRES_DB:-footy}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: footy_postgres_data
